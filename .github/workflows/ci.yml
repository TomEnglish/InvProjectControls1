name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  typecheck-build:
    name: Typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Lint frontend
        run: npm run lint --workspace frontend

      - name: Unit tests
        run: npm run test --workspace frontend
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Build frontend
        run: npm run build
        env:
          # Build-time placeholders — real values are injected by Netlify.
          # The app only throws at runtime if these are missing, so CI builds
          # fine with dummies; what we actually want to catch here is the
          # compiler + Vite pipeline, not env wiring.
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - name: Bundle-size guard
        # Fail if the gzipped JS bundle exceeds 300 KB. Spec budget is 250 KB
        # but we have headroom; bump the threshold once code-splitting lands.
        run: |
          set -e
          MAX_GZIP=$((300 * 1024))
          for f in frontend/dist/assets/index-*.js; do
            SIZE=$(gzip -c "$f" | wc -c)
            echo "$f: $SIZE bytes (gzipped)"
            if [ "$SIZE" -gt "$MAX_GZIP" ]; then
              echo "::error file=$f::Gzipped JS exceeds $MAX_GZIP bytes"
              exit 1
            fi
          done

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
